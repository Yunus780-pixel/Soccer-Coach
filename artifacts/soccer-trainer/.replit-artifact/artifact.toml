kind = "web"
previewPath = "/"
title = "Soccer Leg Trainer"
version = "1.0.0"
id = "artifacts/soccer-trainer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24914

[services.development]
run = "pnpm --filter @workspace/soccer-trainer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/soccer-trainer", "run", "build" ]
publicDir = "artifacts/soccer-trainer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24914"
BASE_PATH = "/"
